name: Atualizar Painel Orçamentário

on:
  schedule:
    - cron: '0 12 * * *'  # 09:00 Brasil (UTC-3) = 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install pandas openpyxl gdown

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Gerar e publicar painel
        env:
          CI: 'true'
        run: python gerar_painel.py
